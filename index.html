    :root {
      --bg: #070b14;
      --bg-soft: #0d1324;
      --card: rgba(18, 24, 42, 0.78);
      --card-strong: #101729;
      --text: #f4f7fb;
      --muted: #98a2b3;
      --line: rgba(255,255,255,0.09);
      --primary: #43c6ff;
      --primary-2: #5f7cff;
      --success: #2ed3a7;
      --warning: #f0b24a;
      --danger: #ff6b6b;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --container: 1180px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body {
      margin: 0;
      font-family: Inter, Arial, sans-serif;
      color: var(--text);
      background:

        radial-gradient(circle at top right, rgba(95,124,255,0.18), transparent 24%),
        linear-gradient(180deg, #060912 0%, #0a1020 42%, #070b14 100%);
      line-height: 1.6;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .container {
      width: min(var(--container), calc(100% - 32px));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(14px);
      background: rgba(7, 11, 20, 0.68);
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      min-height: 76px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
    }

    .brand-mark {
      width: 42px;
      height: 42px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary), var(--primary-2));
      display: grid;
      place-items: center;
      color: white;
      font-weight: 900;
      box-shadow: 0 10px 30px rgba(67,198,255,0.28);
    }

    .nav {
      display: flex;
      gap: 22px;
      align-items: center;
      color: var(--muted);
      font-size: 15px;
    }

    .nav a:hover {
      color: white;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
