<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>XRPN — XRP NEO Protocol</title>

<style>
body {margin:0;font-family:Arial;background:#0b0f1a;color:#fff;}
.container {max-width:1100px;margin:auto;padding:40px 20px;}
nav {display:flex;gap:20px;margin-bottom:40px;}
a {color:#aaa;text-decoration:none;}
a:hover {color:#00c6ff;}
.hero {display:flex;justify-content:space-between;align-items:center;gap:40px;}
h1 {font-size:48px;}
.highlight {color:#00c6ff;}
.buy-box {background:#111827;padding:25px;border-radius:12px;width:350px;}
.price {font-size:28px;color:#00c6ff;font-weight:bold;}
button {margin-top:20px;padding:15px;background:linear-gradient(90deg,#00c6ff,#0072ff);border:none;border-radius:10px;color:#fff;font-weight:bold;}
.section {margin-top:80px;text-align:center;}
.card {background:#111827;padding:25px;border-radius:12px;margin-top:20px;}
</style>
</head>

<body>

<div class="container">

<nav>
<a href="index.html">Home</a>
<a href="staking.html">Staking</a>
<a href="tokenomics.html">Tokenomics</a>
<a href="roadmap.html">Roadmap</a>
<a href="whitepaper.html">Whitepaper</a>
<a href="faq.html">FAQ</a>
</nav>

<div class="hero">

<div>
<h1>Buy XRP at <span class="highlight">Early Prices Again</span></h1>
<p>The XRP NEO Protocol</p>
<p style="color:red;font-weight:bold;">🔥 Limited time before price increase</p>

<button>🚀 Buy XRPN Now</button>
</div>

<div class="buy-box">
<div>XRPN Price</div>
<div class="price">$0.0028</div>

<div style="margin-top:10px;">XRP Price</div>
<div class="price" id="xrp-price">Loading...</div>

<div style="margin-top:10px;color:#4ade80;" id="xrp-mult">...</div>
</div>

</div>

<div class="section">
<h2>If XRPN reaches XRP price</h2>
<div class="card" id="profit-box">...</div>
</div>

</div>

<script>
const XRPN_PRICE = 0.0028;

async function updateXRP(){
  const res = await fetch("https://api.coingecko.com/api/v3/simple/price?ids=ripple&vs_currencies=usd");
  const data = await res.json();
  const price = data.ripple.usd;

  document.getElementById("xrp-price").textContent = "$"+price;

  const mult = (price / XRPN_PRICE).toFixed(0);
  document.getElementById("xrp-mult").textContent = "Up to "+mult+"x";

  document.getElementById("profit-box").innerHTML =
  "$100 → $" + (100*mult).toLocaleString();
}

updateXRP();
setInterval(updateXRP,10000);
</script>

</body>
</html>
